================================================================================
  ossec-fortigate-ar.conf  —  Wazuh Manager ossec.conf snippets
  Add these blocks inside the <ossec_config> element of:
    /var/ossec/etc/ossec.conf

  After editing, validate and restart:
    xmllint --noout /var/ossec/etc/ossec.conf
    systemctl restart wazuh-manager
================================================================================
-->

<!-- ── Command Definition ────────────────────────────────────────────────── -->
<!--
  No <expect> field — Wazuh 4.2+ passes the full alert via STDIN.
  timeout_allowed = yes enables the stateful add → delete lifecycle so
  Wazuh automatically calls the script with "delete" after the timeout expires.
-->
<command>
  <name>fortigate-block</name>
  <executable>fortigate-block.sh</executable>
  <timeout_allowed>yes</timeout_allowed>
</command>


<!-- ── Active Response Examples ──────────────────────────────────────────── -->
<!--
  location = server  → runs on the Wazuh Manager (required — the script calls
                        the FortiGate API, which must be reachable from the Manager).
  timeout            → seconds until Wazuh auto-calls the script with "delete"
                        to unblock. Remove <timeout> for permanent blocks.
-->

<!-- SSH Brute Force (rules 5551, 5712, 5720, 5763) — block for 1 hour -->
<active-response>
  <command>fortigate-block</command>
  <location>server</location>
  <rules_id>5551,5712,5720,5763</rules_id>
  <timeout>3600</timeout>
</active-response>

